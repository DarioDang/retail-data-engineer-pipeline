version: 2

models:
  - name: dim_product
    description: "Dimension table of unique products"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ['laptop', 'phone', 'camera']
  
  - name: dim_store
    description: "Dimension table of unique sellers"
    columns:
      - name: store_id
        tests:
          - unique
          - not_null
      - name: store_name
        tests:
          - not_null

  - name: fact_price_snapshot
    description: "Daily price snapshots per product per seller"
    columns:
      - name: record_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: store_id
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
      - name: price
        tests:
          - not_null
  
  - name: fact_price_changes
    description: "Day-over-day price changes per product"
    columns:
      - name: snapshot_date
        tests:
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: avg_price
        tests:
          - not_null