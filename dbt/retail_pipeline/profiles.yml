retail_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: postgres
      password: root
      dbname: retail_pipeline
      schema: dev
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: public,staging,marts

    prod:
      type: postgres
      host: localhost
      port: 5432
      user: postgres
      password: root
      dbname: retail_pipeline
      schema: prod
      threads: 8
      keepalives_idle: 0
      connect_timeout: 10
      search_path: public,staging,marts

    cloud:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: dev
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: public,staging,marts
