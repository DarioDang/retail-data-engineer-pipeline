retail_pipeline:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres  # Use 'localhost' if connecting from local machine, 'postgres' if connecting from Docker container
      port: 5432
      user: postgres
      password: root
      dbname: retail_pipeline
      schema: dev 
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: public,staging,marts

    prod:
      type: postgres
      host: localhost
      port: 5432
      user: postgres
      password: root
      dbname: retail_pipeline
      schema: prod
      threads: 8
      keepalives_idle: 0
      connect_timeout: 10
      search_path: public,staging,marts