services:
  # Postgres Local Database Setup
  postgres:
    image: postgres:15
    container_name: retail_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # PgAdmin UI for managing Postgres
  pgadmin:
    image: dpage/pgadmin4
    container_name: retail_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
  
  # Kestra Workflow Orchestration
  kestra:
    build:                          
      dockerfile: Dockerfile.kestra 
    container_name: retail_kestra 
    restart: always 
    command: server standalone
    user: "root"                    
    ports:
      - "8080:8080"
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECT_PATH}/kestra/flows:/flows
      - ${PROJECT_PATH}/.env:/app/.env
      - ${PROJECT_PATH}/pipelines:/pipelines
      - ${PROJECT_PATH}/dbt:/dbt
      - ~/.aws:/root/.aws:ro  
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER}
            password: ${POSTGRES_PASSWORD}
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
          queue:
            type: postgres
          plugins:
            defaults:                                         
              - type: io.kestra.plugin.scripts.shell.Commands
                values:
                  taskRunner:
                    type: io.kestra.plugin.core.runner.Process
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  kestra_data: