id: retail_price_pipeline
namespace: retail.pipeline
description: |
  Daily retail price intelligence pipeline
  1. Ingest data from SerpAPI to S3
  2. Load data from S3 to Postgres
  3. Run dbt transformations
  4. Run dbt tests

labels:
  project: retail-pipeline-intelligence
  env: dev 

tasks: 
  # -- Task 1: Ingest from SerpAPI to S3 -- 
  - id: ingest 
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Fetch data from SerpAPI and store as Parquet in S3"
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export $(cat /app/.env | grep -v '^#' | xargs) && cd /pipelines && python ingest.py
  
  # -- Task 2: Load from S3 to Postgres --
  - id: load 
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Load Parquet files from S3 into Postgres"
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export $(cat /app/.env | grep -v '^#' | xargs) && cd /pipelines && python load.py
  
  # -- Task 3: Run dbt models --
  - id: dbt_run 
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run dbt transformations"
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export $(cat /app/.env | grep -v '^#' | xargs) && cd /dbt/retail_pipeline && dbt deps --profiles-dir . && dbt run --profiles-dir .

  # -- Task 4: Run dbt tests --
  - id: dbt_test
    type: io.kestra.plugin.scripts.shell.Commands
    description: "Run dbt tests to validate data quality"
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    commands:
      - export $(cat /app/.env | grep -v '^#' | xargs) && cd /dbt/retail_pipeline && dbt test --profiles-dir .

  
  # -- Task 5: Log completion --
  - id: log_completion
    type: io.kestra.plugin.core.log.Log
    message: "✅ Retail pipeline completed successfully for {{ now() }}"

# -- Error Handling --
errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: "❌ Pipeline failed at {{ task.id }} — check logs"

# -- Triggers --
triggers:
  - id: every_day_8am
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * *"
    disabled: true